name: Fix slugs

on:
  push:
    branches: [main]
    paths:
      - 'content/pieces/**'

jobs:
  fix-slugs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
      
      - name: Fix slugs
        run: node scripts/fix-pieces-slugs.js
      
      - name: Commit changes
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"
          git add content/
          git diff --quiet && git diff --staged --quiet || git commit -m "🔧 Auto-fix slugs"
          git push
